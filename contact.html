<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - 4NOX WAV</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <meta name="description" content="Contact 4NOX WAV for premium sound design and audio solutions.">


    <!-- 4NOX WAV Theme Scripts & Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        black: '#000000',
                        zinc: {
                            800: '#27272a',
                            900: '#18181b',
                            950: '#09090b',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

</head>
<body class="antialiased selection:bg-zinc-800 selection:text-white bg-black text-white" style="font-family: \'Inter\', sans-serif;">
    
    <!-- Navigation -->
    <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-md border-b border-zinc-900 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center">
                    <a href="index.html" class="flex items-center gap-3">
                        <img src="Nox Audios Logo.png" alt="4NOX WAV Logo" class="h-10 w-auto">
                        <span class="text-xl font-extrabold tracking-tighter text-white hover:text-zinc-300 transition-colors hidden sm:block">4NOX WAV</span>
                    </a>
                </div>
                <div class="hidden md:flex space-x-8 lg:space-x-10">
                    <a href="portfolio.html" class="text-zinc-400 hover:text-white transition-colors duration-300 text-sm tracking-widest uppercase font-medium">Portfolio</a>
                    <a href="creators.html" class="text-zinc-400 hover:text-white transition-colors duration-300 text-sm tracking-widest uppercase font-medium">Creators</a>
                    <a href="index.html#socials" class="text-zinc-400 hover:text-white transition-colors duration-300 text-sm tracking-widest uppercase font-medium">Socials</a>
                    <a href="contact.html" class="text-white transition-colors duration-300 text-sm tracking-widest uppercase font-medium">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-zinc-400 hover:text-white focus:outline-none p-2">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path id="menu-icon" stroke-linecap="square" stroke-linejoin="miter" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-black border-b border-zinc-900">
            <div class="px-4 pt-2 pb-6 space-y-2">
                <a href="portfolio.html" class="mobile-link block py-3 text-base font-medium text-zinc-400 hover:text-white border-b border-zinc-900 tracking-widest uppercase">Portfolio</a>
                <a href="creators.html" class="mobile-link block py-3 text-base font-medium text-zinc-400 hover:text-white border-b border-zinc-900 tracking-widest uppercase">Creators</a>
                <a href="index.html#socials" class="mobile-link block py-3 text-base font-medium text-zinc-400 hover:text-white border-b border-zinc-900 tracking-widest uppercase">Socials</a>
                <a href="contact.html" class="mobile-link block py-3 text-base font-medium text-white tracking-widest uppercase">Contact</a>
            </div>
        </div>
    </nav>


    <main>
        <section class="pt-32 pb-20 lg:pt-48 lg:pb-32 min-h-screen flex flex-col justify-center bg-black">
            <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 w-full text-center">
                <img src="Nox Audios Logo.png" alt="4NOX WAV" class="w-24 md:w-32 h-auto mx-auto mb-8">
                <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-white mb-4">Get In Touch</h1>
                <p class="text-zinc-500 mb-12 text-sm md:text-base uppercase tracking-widest">Premium Sound Design & Audio Solutions</p>
                
                <div class="bg-zinc-950 border border-zinc-800 p-8 text-left transition-colors hover:border-zinc-700">
                    <form id="contact-form" class="space-y-6">
                        <div>
                            <label class="block text-zinc-400 text-xs font-bold mb-2 uppercase tracking-widest">Your Name</label>
                            <input type="text" name="from_name" required class="w-full bg-black border border-zinc-800 p-4 text-white text-sm focus:outline-none focus:border-zinc-500 transition-colors" placeholder="John Doe">
                        </div>
                        <div>
                            <label class="block text-zinc-400 text-xs font-bold mb-2 uppercase tracking-widest">Your Email</label>
                            <input type="email" name="reply_to" required class="w-full bg-black border border-zinc-800 p-4 text-white text-sm focus:outline-none focus:border-zinc-500 transition-colors" placeholder="john@example.com">
                        </div>
                        <div>
                            <label class="block text-zinc-400 text-xs font-bold mb-2 uppercase tracking-widest">Message</label>
                            <textarea name="message" rows="5" required class="w-full bg-black border border-zinc-800 p-4 text-white text-sm focus:outline-none focus:border-zinc-500 transition-colors" placeholder="How can we help?"></textarea>
                        </div>
                        <button type="submit" class="w-full py-4 bg-white text-black font-semibold text-xs uppercase tracking-widest hover:bg-zinc-200 transition-colors duration-300">
                            Send Message
                        </button>
                    </form>
                    <p id="status-message" class="mt-4 text-center text-sm text-zinc-400"></p>
                </div>

                <div class="mt-12 flex justify-center">
                    <button onclick="copyEmail('contact@4noxwav.com', this, true)" class="text-lg font-bold text-white hover:text-zinc-300 transition-colors tracking-tight focus:outline-none cursor-pointer border-b border-zinc-800 pb-1 hover:border-white" title="Copy Email">
                        contact@4noxwav.com
                    </button>
                </div>
                
                <!-- EmailJS SDK -->
                <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
            </div>
        </section>
    </main>

    
    <!-- Footer -->
    
    <!-- Footer -->
    <footer class="bg-black py-10 border-t border-zinc-900 text-center mt-24">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col items-center">
            <div class="text-xl font-bold tracking-tighter text-zinc-700 mb-4">4NOX WAV</div>
            <p class="text-zinc-600 text-xs tracking-widest uppercase">
                &copy; <span id="year"></span> 4NOX WAV. All rights reserved.
            </p>
        </div>
    </footer>



    <script src="scripts.js"></script>
</body>
</html>
